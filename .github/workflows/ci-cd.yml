name: CI/CD - React Vite Node EC2

on:
  pull_request:
    branches:
      - main

  push:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-deployment
  cancel-in-progress: false

jobs:
  ci:
    name: Validar aplicação
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Executar lint
        run: npm run lint --if-present

      - name: Executar testes
        run: npm test --if-present

      - name: Gerar build
        run: npm run build

  deploy:
    name: Implantar na EC2
    runs-on: ubuntu-latest
    needs: ci

    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    environment:
      name: production

    steps:
      - name: Configurar acesso SSH
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$EC2_SSH_KEY" > ~/.ssh/ec2_key
          chmod 600 ~/.ssh/ec2_key
          ssh-keyscan -H "$EC2_HOST" >> ~/.ssh/known_hosts

      - name: Realizar deploy
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_PORT: ${{ secrets.EC2_PORT }}
          EC2_PROJECT_PATH: ${{ secrets.EC2_PROJECT_PATH }}
        run: |
          ssh \
            -i ~/.ssh/ec2_key \
            -p "$EC2_PORT" \
            "$EC2_USER@$EC2_HOST" \
            "set -e
             cd '$EC2_PROJECT_PATH'
             git fetch origin main
             git checkout main
             git pull --ff-only origin main
             npm ci
             npm run build
             pm2 restart everafter
             pm2 save
             pm2 status"
